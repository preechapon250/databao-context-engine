name: Pytest Tests

permissions: { }

env:
  OLLAMA_MODEL: nomic-embed-text
  OLLAMA_MODEL_VERSION: v1.5

on:
  push:
    paths-ignore:
      - docs/
    branches: [ "main" ]
  pull_request:
    paths-ignore:
      - docs/
    branches: [ "main" ]
  workflow_dispatch:
  workflow_call:

jobs:
  prepare-ollama-cache:
    name: Prepare Ollama cache
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/prepare-ollama-cache
        with:
          model-name: ${{ env.OLLAMA_MODEL }}
          model-version: ${{ env.OLLAMA_MODEL_VERSION }}

  tests:
    needs: prepare-ollama-cache
    name: Run ${{ matrix.test-suite.name }} tests on ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.11", "3.12", "3.13", "3.14" ]
        test-suite:
          - name: core
            uv-sync-args: "--all-extras --no-extra pdf"
            pytest-args: "--ignore tests/plugins/files/pdf"
          - name: pdf
            uv-sync-args: "--extra pdf"
            pytest-args: "tests/plugins/files/pdf"

    env:
      TMPDIR: /mnt/tmp
      TEMP: /mnt/tmp
      TMP: /mnt/tmp
      BIGQUERY_TEST_PROJECT: ${{ vars.BIGQUERY_TEST_PROJECT }}
      BIGQUERY_TEST_DATASET: ${{ vars.BIGQUERY_TEST_DATASET }}

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Prepare /mnt tmp
        run: |
          sudo mkdir -p /mnt/tmp
          sudo chmod 1777 /mnt/tmp

      - name: Restore Ollama models cache
        uses: ./.github/actions/ollama-cache-restore
        with:
          key: ollama-${{ runner.os }}-${{ env.OLLAMA_MODEL }}-${{ env.OLLAMA_MODEL_VERSION }}

      - name: Start Ollama (uses cached models)
        uses: ./.github/actions/run-ollama-with-model
        with:
          model: ${{ env.OLLAMA_MODEL}}:${{ env.OLLAMA_MODEL_VERSION}}

      - name: Set up project
        uses: ./.github/actions/setup-project
        with:
          python-version: ${{ matrix.python-version }}
          uv-sync-args: ${{ matrix.test-suite.uv-sync-args }}

      - name: Create ADC credentials file
        shell: bash
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp-sa.json
        run: |
          cat > "$GOOGLE_APPLICATION_CREDENTIALS" << 'JSON'
          ${{ secrets.GCP_SA_KEY_JSON }}
          JSON
          echo "GOOGLE_APPLICATION_CREDENTIALS=$GOOGLE_APPLICATION_CREDENTIALS" >> "$GITHUB_ENV"

      - name: Run tests with all-extras
        run: uv run pytest -v ${{ matrix.test-suite.pytest-args }}

      - name: Cleanup Docker (post)
        if: always()
        run: |
          docker rm -f ollama || true
          docker system prune -af --volumes || true
          docker system df || true